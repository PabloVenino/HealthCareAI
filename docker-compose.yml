version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app/server
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=8000
      # Pass through external API keys from the local .env file
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    env_file:
      - .env

  frontend:
    build:
      context: ./app
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    environment:
      # Tell Vite to connect to the backend on the host machine
      - VITE_API_URL=http://localhost:8000
    # Automatically install any new dependencies before starting the dev server
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    depends_on:
      - backend
